# DigitalOcean App Spec — Staging
# =============================================================================
# Uses pre-built Docker images from GHCR (not git source).
# Each service CI workflow builds and pushes its image; deploy-staging.yml
# patches the image tags here before calling doctl apps update.
#
# Key staging defaults:
#   - APP_ENV: staging
#   - postgres: production: true, cluster_name: tachyon-pg-staging (pre-provisioned standalone cluster)
#   - valkey: production: true, cluster_name: tachyon-valkey-staging (pre-provisioned)
#
# See app.prod.yml for the production spec.
# =============================================================================
name: tachyon-staging
region: nyc3

services:
  - name: tachyon-api
    image:
      registry_type: GHCR
      registry: tachyonapp
      repository: tachyon-api
      tag: latest
    instance_count: 1
    instance_size_slug: professional-xs
    http_port: 4000
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        value: "staging"
      - key: PORT
        value: "4000"
      - key: LOG_LEVEL
        value: "info"
      - key: DATABASE_URL
        value: ""
        type: SECRET
      - key: POSTGRES_SSL
        value: "true"
      - key: POSTGRES_MAX_CONNECTIONS
        value: "20"
      - key: DB_ENCRYPTION_KEY
        value: ""
        type: SECRET
      - key: VALKEY_HOST
        value: "${tachyon-valkey-staging.HOSTNAME}"
      - key: VALKEY_PORT
        value: "${tachyon-valkey-staging.PORT}"
      - key: VALKEY_PASSWORD
        value: "${tachyon-valkey-staging.PASSWORD}"
        type: SECRET
      - key: VALKEY_TLS
        value: "true"
      - key: CORS_ORIGIN
        value: "https://tachyon.app"
      - key: BULL_BOARD_USERNAME
        value: ""
        type: SECRET
      - key: BULL_BOARD_PASSWORD
        value: ""
        type: SECRET
      - key: CLERK_PUBLISHABLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_JWKS_URL
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_ISSUER
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: CLERK_JWKS_CACHE_TTL
        scope: RUN_TIME
        value: "600"
      - key: STRIPE_SECRET_KEY
        value: ""
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
        type: SECRET
      - key: STRIPE_PRICE_ID_BYOK
        value: ""
        type: SECRET
      - key: STRIPE_PRICE_ID_TACHYON_HOSTED
        value: ""
        type: SECRET
      - key: SENTRY_DSN
        value: ""
        type: SECRET
      - key: GIT_COMMIT_SHA
        value: "${_self.COMMIT_HASH}"

workers:
  - name: tachyon-workers
    image:
      registry_type: GHCR
      registry: tachyonapp
      repository: tachyon-workers
      tag: latest
    instance_count: 1
    instance_size_slug: professional-xs
    envs:
      - key: NODE_ENV
        value: "staging"
      - key: LOG_LEVEL
        value: "info"
      - key: VALKEY_HOST
        value: "${tachyon-valkey-staging.HOSTNAME}"
      - key: VALKEY_PORT
        value: "${tachyon-valkey-staging.PORT}"
      - key: VALKEY_PASSWORD
        value: "${tachyon-valkey-staging.PASSWORD}"
        type: SECRET
      - key: VALKEY_TLS
        value: "true"
      - key: DATABASE_URL
        value: ""
        type: SECRET
      - key: POSTGRES_SSL
        value: "true"
      - key: DB_ENCRYPTION_KEY
        value: ""
        type: SECRET
      - key: BULLMQ_CONCURRENCY
        value: "5"
      - key: TACHYON_BRAIN_DAILY_CAP
        value: "10"
      - key: ANTHROPIC_API_KEY
        value: ""
        type: SECRET
      - key: SENTRY_DSN
        value: ""
        type: SECRET
      - key: GIT_COMMIT_SHA
        value: "${_self.COMMIT_HASH}"

jobs:
  - name: db-migrate
    image:
      registry_type: GHCR
      registry: tachyonapp
      repository: tachyon-db-migrate
      tag: latest
    instance_size_slug: professional-xs
    instance_count: 1
    kind: PRE_DEPLOY
    envs:
      - key: MIGRATION_ENV
        value: "staging"
      - key: DATABASE_URL
        value: ""
        type: SECRET

databases:
  - name: tachyon-pg-staging
    engine: PG
    version: "18"
    size: db-s-1vcpu-1gb
    num_nodes: 1
    production: true
    cluster_name: tachyon-pg-staging

  - name: tachyon-valkey-staging
    engine: VALKEY
    version: "8"
    size: db-s-1vcpu-1gb
    num_nodes: 1
    production: true
    cluster_name: tachyon-valkey-staging

envs:
  - key: APP_ENV
    value: "staging"