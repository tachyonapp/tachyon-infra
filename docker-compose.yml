# Tachyon Local Development - Docker Compose
# =============================================================================
# USAGE
# =============================================================================
# - `docker compose up`                  -- Build from sibling repos (default)
# - `docker compose --profile ghcr up`   -- Pull pre-built images from GHCR
# - `docker compose up postgres valkey`   -- Infrastructure only (for local `npm run dev`)
# =============================================================================
# PROFILE STRATEGY
# =============================================================================
# Services WITHOUT a `profiles` key start by default with `docker compose up`.
# Services WITH a `profiles` key are opt-in and only start when that profile
# is explicitly activated via `--profile <name>`.
#
# Build-from-source services (api, workers, db-migrate) have NO profile, so
# they start automatically. GHCR services are gated behind `profiles: [ghcr]`.
#
# IMPORTANT: Build and GHCR variants share the same container_name (e.g.
# tachyon-api), so they are mutually exclusive -- Docker will refuse to start
# both simultaneously.
# =============================================================================


# --- Infrastructure Services ---
services:
  postgres:
    image: postgres:18-alpine
    container_name: tachyon-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tachyon_dev
      POSTGRES_USER: tachyon
      POSTGRES_PASSWORD: tachyon_local_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tachyon -d tachyon_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tachyon

  valkey:
    image: valkey/valkey:8-alpine
    container_name: tachyon-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tachyon

  # --- Application Services (build from sibling repos) ---
  # No `profiles` key = these start by default with `docker compose up`
  #
  # BUILD TARGET: `builder` (not `production`)
  # The builder stage includes all dependencies (including devDeps like `tsx`)
  # and the full source. Combined with volume mounts for `src/` and `tsx watch`
  # commands, this enables hot reload -- source changes on the host are reflected
  # inside the container immediately without rebuilding the image.
  api:
    build:
      context: ../tachyon-api
      target: builder
      secrets:
        - node_auth_token
    command: npx tsx watch src/index.ts
    container_name: tachyon-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      LOG_LEVEL: debug
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
      POSTGRES_SSL: "false"
      POSTGRES_MAX_CONNECTIONS: "20"
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: ""
      VALKEY_TLS: "false"
      CORS_ORIGIN: http://localhost:8081
      BULL_BOARD_USERNAME: ""
      BULL_BOARD_PASSWORD: ""
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_JWKS_CACHE_TTL: ${AUTH0_JWKS_CACHE_TTL:-600}
      SENTRY_DSN: ${SENTRY_DSN:-}
    volumes:
      - ../tachyon-api/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - tachyon

  workers:
    build:
      context: ../tachyon-workers
      target: builder
      secrets:
        - node_auth_token
    command: npx tsx watch src/index.ts
    container_name: tachyon-workers
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: ""
      VALKEY_TLS: "false"
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
      POSTGRES_SSL: "false"
      BULLMQ_CONCURRENCY: "5"
      SENTRY_DSN: ""
    volumes:
      - ../tachyon-workers/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    networks:
      - tachyon

  db-migrate:
    build:
      context: ../tachyon-db
      target: builder
    command: npx tsx src/migrate.ts
    container_name: tachyon-db-migrate
    environment:
      MIGRATION_ENV: local
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
    volumes:
      - ../tachyon-db/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tachyon
    restart: "no"

  # --- Application Services (pull from GHCR) ---
  # Opt-in via `docker compose --profile ghcr up`. Shares container_name with
  # build-from-source variants above, so only one mode can run at a time.
  api-ghcr:
    image: ghcr.io/tachyonapp/tachyon-api:latest
    container_name: tachyon-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: "4000"
      LOG_LEVEL: debug
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
      POSTGRES_SSL: "false"
      POSTGRES_MAX_CONNECTIONS: "20"
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: ""
      VALKEY_TLS: "false"
      CORS_ORIGIN: http://localhost:8081
      BULL_BOARD_USERNAME: ""
      BULL_BOARD_PASSWORD: ""
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_JWKS_CACHE_TTL: ${AUTH0_JWKS_CACHE_TTL:-600}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      db-migrate-ghcr:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - tachyon
    profiles:
      - ghcr

  workers-ghcr:
    image: ghcr.io/tachyonapp/tachyon-workers:latest
    container_name: tachyon-workers
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
      VALKEY_HOST: valkey
      VALKEY_PORT: "6379"
      VALKEY_PASSWORD: ""
      VALKEY_TLS: "false"
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
      POSTGRES_SSL: "false"
      BULLMQ_CONCURRENCY: "5"
      SENTRY_DSN: ""
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      db-migrate-ghcr:
        condition: service_completed_successfully
    networks:
      - tachyon
    profiles:
      - ghcr

  db-migrate-ghcr:
    image: ghcr.io/tachyonapp/tachyon-db-migrate:latest
    container_name: tachyon-db-migrate
    environment:
      MIGRATION_ENV: local
      DATABASE_URL: postgres://tachyon:tachyon_local_dev@postgres:5432/tachyon_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tachyon
    profiles:
      - ghcr
    restart: "no"

volumes:
  pgdata:
  valkeydata:

networks:
  tachyon:
    driver: bridge

# NODE_AUTH_TOKEN is required to pull @tachyonapp/tachyon-db from GitHub Packages
# during the Docker build. Set it in your shell before running `docker compose up`:
#   export NODE_AUTH_TOKEN=<your-github-pat>
# The token is passed as a BuildKit secret and is never written to the image layer.
secrets:
  node_auth_token:
    environment: NODE_AUTH_TOKEN